# VeRL GRPO + LoRA config for the AuctionNet LLM bidding agent.
# Target hardware: 1× NVIDIA H200 (141 GB).
# LoRA is REQUIRED — full-parameter training does not fit on a single H200.
#
# Launch (from AuctionNet/strategy_train_env/):
#   python -m bidding_train_env.llm.verl.launch_train \
#       --config-path=$(realpath bidding_train_env/llm/verl/config) \
#       --config-name=qwen35_9b_grpo_lora
#
# See plan at .claude/plans/i-am-implementing-a-jolly-puzzle.md for details.

defaults:
  - ppo_trainer
  - _self_

data:
  train_files: [/scratch/gpfs/CHIJ/ruirong/rl_general/proj/AuctionNet/strategy_train_env/bidding_train_env/llm/verl/data/train.parquet]
  val_files:   [/scratch/gpfs/CHIJ/ruirong/rl_general/proj/AuctionNet/strategy_train_env/bidding_train_env/llm/verl/data/val.parquet]
  train_batch_size: 8            # episodes per update step before GRPO repeat
  max_prompt_length: 1024
  max_response_length: 16384     # response includes all later user+assistant turns
  # Disable: triggers a verl codepath that imports `qwen_vl_utils` because the
  # Qwen3.5-9B snapshot ships vision preprocessor configs. Our prompts are
  # already short (< max_prompt_length), so this filter is a no-op.
  filter_overlong_prompts: false
  return_raw_chat: true

actor_rollout_ref:
  model:
    path: /scratch/gpfs/CHIJ/ruirong/rl_general/proj/AuctionNet/strategy_train_env/bidding_train_env/llm/models/Qwen3.5-9B
    enable_gradient_checkpointing: true
    # LoRA — hard requirement for 1× H200.
    lora_rank: 32
    lora_alpha: 32
    target_modules: all-linear

  actor:
    strategy: fsdp
    ppo_mini_batch_size: 8       # must divide data.train_batch_size
    ppo_micro_batch_size_per_gpu: 1
    optim:
      lr: 1.0e-5
    fsdp_config:
      param_offload: true
      optimizer_offload: true
    use_kl_loss: true
    kl_loss_coef: 1.0e-3
    kl_loss_type: low_var_kl
    entropy_coeff: 0.0

  rollout:
    name: vllm
    mode: async
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.35  # leave headroom for FSDP all-gather peaks
    n: 8                          # GRPO group size per prompt
    temperature: 1.0
    top_p: 0.95
    max_model_len: 24576
    max_num_batched_tokens: 32768
    log_prob_micro_batch_size_per_gpu: 1
    multi_turn:
      enable: true
      max_assistant_turns: 48
      max_user_turns: 48
      tool_config_path: null
      interaction_config_path: /scratch/gpfs/CHIJ/ruirong/rl_general/proj/AuctionNet/strategy_train_env/bidding_train_env/llm/verl/noop_interaction.yaml
      completion_callback: bidding_train_env.llm.verl.auction_completion_callback.AuctionBiddingCompletionCallback
      use_inference_chat_template: false
      tokenization_sanity_check_mode: "off"
      format: hermes

  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true

algorithm:
  adv_estimator: grpo
  gamma: 1.0
  lam: 1.0
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.0                  # KL is folded into loss via use_kl_loss above

reward_model:
  reward_manager: auction_env

trainer:
  project_name: auctionnet_llm_rl
  experiment_name: qwen35_9b_grpo_lora
  total_epochs: 3                 # ~60 update steps on ~960-row train
  nnodes: 1
  n_gpus_per_node: 1
  save_freq: 20
  test_freq: 20
  val_before_train: true
  default_local_dir: output/llm/training
  logger: [console]               # flip to [console, wandb] if wandb is set up
